version: "3.8"

networks:
  arp_lab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# build:
#   context: ./Tests/test1/server
#   dockerfile: Dockerfile
services:
  ftp_server:
    image: fauria/vsftpd
    container_name: ftp_server
    networks:
      arp_lab:
        ipv4_address: 172.20.0.10
  
    environment:
      FTP_USER: labuser
      FTP_PASS: secret123
      PASV_ADDRESS: 172.20.0.10
    cap_add:
      - NET_ADMIN #https://man7.org/linux/man-pages/man7/capabilities.7.html

  client:
    container_name: ftp_client
    networks:
      arp_lab:
        ipv4_address: 172.20.0.20
    build:
      context: ./Tests/test1/client
      dockerfile: Dockerfile
  
  attacker:
    container_name: attacker
    networks:
      arp_lab:
        ipv4_address: 172.20.0.99
    build:
      context: ./Tests/test1/attacker
      dockerfile: Dockerfile
    cap_add:
      - NET_ADMIN    # RAW_SOCKET access
      - NET_RAW